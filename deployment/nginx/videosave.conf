# Render __PUBLIC_HOSTNAME__, __TLS_CERTIFICATE_FILE__, and
# __TLS_CERTIFICATE_KEY_FILE__ before the operator runs nginx -t.

log_format videosave_main
  '$remote_addr request_id=$request_id status=$status bytes=$body_bytes_sent '
  'method=$request_method uri=$uri protocol=$server_protocol upstream=$upstream_status';

upstream videosave_web {
  server 127.0.0.1:3000;
  keepalive 32;
}

server {
  listen 80;
  listen [::]:80;
  server_name __PUBLIC_HOSTNAME__;
  return 308 https://__PUBLIC_HOSTNAME__$request_uri;
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name __PUBLIC_HOSTNAME__;

  ssl_certificate __TLS_CERTIFICATE_FILE__;
  ssl_certificate_key __TLS_CERTIFICATE_KEY_FILE__;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:VideoSaveTLS:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  access_log /var/log/nginx/videosave-access.log videosave_main;
  error_log /var/log/nginx/videosave-error.log warn;

  client_max_body_size 16k;
  client_header_buffer_size 8k;
  large_client_header_buffers 4 16k;
  client_body_timeout 15s;
  client_header_timeout 15s;
  keepalive_timeout 30s;
  send_timeout 60s;

  add_header X-Request-ID $request_id always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options DENY always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  # Enable only after production HTTPS and subdomain impact are verified:
  # add_header Strict-Transport-Security "max-age=31536000" always;

  location / {
    proxy_pass http://videosave_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host __PUBLIC_HOSTNAME__;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host __PUBLIC_HOSTNAME__;
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Real-IP "";
    proxy_set_header Forwarded "";
    proxy_set_header X-VideoSave-Client-IP $remote_addr;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 60s;
    proxy_request_buffering on;
    proxy_buffering on;
    proxy_hide_header X-Powered-By;
  }

  location ~ ^/api/file/[A-Za-z0-9_-]{8,128}$ {
    proxy_pass http://videosave_web;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host __PUBLIC_HOSTNAME__;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host __PUBLIC_HOSTNAME__;
    proxy_set_header X-Forwarded-For "";
    proxy_set_header X-Real-IP "";
    proxy_set_header Forwarded "";
    proxy_set_header X-VideoSave-Client-IP $remote_addr;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 5s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_request_buffering on;
    proxy_buffering off;
    proxy_hide_header X-Powered-By;
  }
}
